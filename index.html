<!-- ============================================================ -->
<!-- MAIN APP / 主界面                                             -->

  { no:55, shorts:'B',    name:'bibigo Sliced Kimchi 1.4kg',         price:16.50, eaBox:6  },
  { no:56, shorts:'0.5lb',name:'Chilli Powder 227g',                price:3.15,  eaBox:65 },
  { no:57, shorts:'1lb',  name:'Chilli Powder 454g',                price:5.40,  eaBox:36 },
  { no:58, shorts:'2lb',  name:'Chilli Powder 908g',                price:10.45, eaBox:18 },
  { no:59, shorts:'5lb',  name:'Chilli Powder 2.27kg',              price:24.75, eaBox:8  },
];

// Category A: auto 10% off, excluded from global discount / 固定9折，不参与全局折扣
const CAT_A = new Set(['P', 'J', 'N']);

// Longest-match parsing: sort by shortcode length descending
// 最长匹配解析：按快捷码长度降序
const SORTED_PRODUCTS = [...PRODUCTS].sort((a, b) => b.shorts.length - a.shorts.length);


// ============================================================
// 2. STATE / 应用状态
// ============================================================
let globalDiscount = 0; // 0 | 2 | 4
let isTransfer     = false; // false = Cash (default) | true = Transfer


// ============================================================
// 3. COMMAND PARSING / 快捷码解析
//    Format: [ex?][ShortCode][Quantity][Unit?]
//    "ex" prefix = exchange item (shows $0 on invoice)
//    "ex" 前缀 = 换货（发票显示 $0）
//    Spaces stripped: "ex c 10" → "exc10"
// ============================================================
function parseCommand(raw) {
  const cmd = raw.trim().toLowerCase().replace(/\s+/g, '');
  if (!cmd) return { error: 'empty' };

  // Detect exchange prefix / 检测换货前缀
  let isExchange = false;
  let lookup     = cmd;
  if (cmd.startsWith('ex') && cmd.length > 2) {
    isExchange = true;
    lookup     = cmd.slice(2);
  }

  for (const product of SORTED_PRODUCTS) {
    const sc = product.shorts.toLowerCase();
    if (!lookup.startsWith(sc)) continue;

    const rest = lookup.slice(sc.length);
    if (!rest) return { error: `Missing qty after "${product.shorts}"` };

    const boxM = rest.match(/^(\d+)box$/);
    const eaM  = rest.match(/^(\d+)(ea)?$/);

    if (boxM) return { product, qty: parseInt(boxM[1], 10) * product.eaBox, isExchange };
    if (eaM)  {
      const qty = parseInt(eaM[1], 10);
      if (qty <= 0) return { error: 'Qty must be > 0' };
      return { product, qty, isExchange };
    }
  }

  return { error: `Unknown: "${raw.trim()}"` };
}


// ============================================================
// 4. TEXTAREA PARSING / 多行输入解析
//    Line 1 → store name
//    Lines 2+ → product commands (empty lines skipped)
//    第一行=店名，其余行=产品指令（空行跳过）
// ============================================================
function parseTextarea() {
  const raw   = document.getElementById('order-input').value;
  const lines = raw.split('\n').map(l => l.trim());

  // First non-empty line is store name / 第一个非空行为店名
  let storeName = '';
  let startIdx  = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i]) { storeName = lines[i]; startIdx = i + 1; break; }
  }

  const items  = [];
  const errors = [];

  for (let i = startIdx; i < lines.length; i++) {
    if (!lines[i]) continue; // skip empty / 跳过空行
    const result = parseCommand(lines[i]);
    if (result.error) {
      if (result.error !== 'empty') errors.push({ line: lines[i], msg: result.error });
      continue;
    }
    // Merge same product + same exchange flag / 合并相同产品且换货标志相同的行
    const existing = items.find(it =>
      it.product.shorts === result.product.shorts && it.isExchange === result.isExchange
    );
    if (existing) existing.qty += result.qty;
    else items.push({ product: result.product, qty: result.qty, isExchange: result.isExchange });
  }

  return { storeName, items, errors };
}


// ============================================================
// 5. CALCULATIONS / 金额计算 (prices are GST-inclusive / 含GST定价)
// ============================================================

// Line subtotal: qty × unit price, NO discount. Exchange items = $0.
// 行小计：数量 × 单价，不含折扣。换货项 = $0
function lineSub(product, qty, isExchange) {
  if (isExchange) return 0;
  return product.price * qty;
}

// Line total after discounts. Exchange items = $0.
// 行折后合计。换货项 = $0
function lineAfterDisc(product, qty, isExchange) {
  if (isExchange) return 0;
  if (CAT_A.has(product.shorts)) return product.price * qty * 0.9;
  if (product.shorts !== 'Salt' && globalDiscount > 0) return product.price * qty * (1 - globalDiscount / 100);
  return product.price * qty;
}

// Discount column label. Exchange = "-"
// 折扣列标签。换货 = "-"
function discLabel(product, isExchange) {
  if (isExchange)                return '-';
  if (CAT_A.has(product.shorts)) return '10%';
  if (product.shorts === 'Salt') return 'Special';
  if (globalDiscount > 0)        return `${globalDiscount}%`;
  return '';
}

function calcSummary(items) {
  let subTotal       = 0; // Sum of qty × price before ANY discount (exchange = $0)
  let totalAfterDisc = 0; // Sum of after-discount line totals (exchange = $0)

  items.forEach(({ product, qty, isExchange }) => {
    subTotal       += lineSub(product, qty, isExchange);
    totalAfterDisc += lineAfterDisc(product, qty, isExchange);
  });

  // discAmt covers Cat A 10% + Cat B global discount combined
  // 折扣总额 = Cat A 10% + Cat B 全局折扣 合并计算
  const discAmt = subTotal - totalAfterDisc;

  // Australian cash rounding (nearest $0.05) / 澳洲现金取整（最近5分）
  let cashRounding = 0;
  let cashTotal    = totalAfterDisc;
  if (!isTransfer) {
    cashTotal    = Math.round(totalAfterDisc * 20) / 20;
    cashRounding = parseFloat((cashTotal - totalAfterDisc).toFixed(2));
  }

  return { subTotal, discAmt, totalAfterDisc, cashRounding, cashTotal };
}


// ============================================================
// 6. LIVE TEXTAREA FEEDBACK / 实时输入反馈
// ============================================================
function onTextareaInput() {
  const { storeName, items, errors } = parseTextarea();

  // Update invoice number display / 更新发票号显示
  const d    = new Date();
  const dd   = String(d.getDate()).padStart(2, '0');
  const mm   = String(d.getMonth() + 1).padStart(2, '0');
  const yy   = String(d.getFullYear()).slice(-2);
  const inv  = `${dd}${mm}${yy}${storeName.toUpperCase().replace(/\s+/g, '')}`;
  document.getElementById('inv-num-display').textContent = storeName ? inv : '';

  // Show parse errors inline / 显示解析错误
  const errEl = document.getElementById('parse-errors');
  if (errors.length === 0) { errEl.classList.add('hidden'); return; }
  errEl.classList.remove('hidden');
  errEl.innerHTML = errors.map(e =>
    `<div class="flex items-start gap-1 text-xs text-red-400 py-0.5">
       <i data-lucide="alert-circle" class="w-3 h-3 mt-0.5 shrink-0"></i>
       <span><code class="bg-red-50 px-1 rounded">${e.line}</code> — ${e.msg}</span>
     </div>`
  ).join('');
  lucide.createIcons();

  // Persist to localStorage / 保存到localStorage
  localStorage.setItem('orderText_v2', document.getElementById('order-input').value);
  localStorage.setItem('disc_v2', String(globalDiscount));
  localStorage.setItem('transfer_v2', String(isTransfer));
}


// ============================================================
// 7. CONTROLS / 折扣与支付控制
// ============================================================
function setDiscount(pct) {
  globalDiscount = (globalDiscount === pct) ? 0 : pct;
  renderControlButtons();
  onTextareaInput(); // re-run to persist
}

function toggleTransfer() {
  isTransfer = !isTransfer;
  renderControlButtons();
  onTextareaInput();
}

function renderControlButtons() {
  const base     = 'px-3 py-1.5 rounded-xl text-xs font-bold border btn-press transition-colors';
  const active   = `${base} bg-blue-600 text-white border-blue-600`;
  const inactive = `${base} border-gray-200 text-gray-600 bg-white`;
  document.getElementById('btn-disc-2').className   = globalDiscount === 2 ? active : inactive;
  document.getElementById('btn-disc-4').className   = globalDiscount === 4 ? active : inactive;
  document.getElementById('btn-transfer').className = isTransfer            ? active : inactive;
}

function clearAll() {
  if (!confirm('Clear everything?')) return;
  document.getElementById('order-input').value = '';
  globalDiscount = 0;
  isTransfer     = false;
  document.getElementById('inv-num-display').textContent = '';
  document.getElementById('parse-errors').classList.add('hidden');
  renderControlButtons();
  localStorage.removeItem('orderText_v2');
}


// ============================================================
// 8. INVOICE NUMBER / 发票号
// ============================================================

// Normalize store name: uppercase + strip everything except A-Z 0-9
// 店名标准化：大写 + 去掉字母数字以外的所有字符（空格、& 等）
// e.g. "d&k" → "DK",  "D & K" → "DK",  "tk" → "TK"
function normalizeStore(name) {
  return name.toUpperCase().replace(/[^A-Z0-9]/g, '');
}

function getInvNum(storeName) {
  const d  = new Date();
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yy = String(d.getFullYear()).slice(-2);
  return `${dd}${mm}${yy}${normalizeStore(storeName)}`;
}


// ============================================================
// 9. INVOICE HTML BUILDER / 发票HTML构建
//    Columns: # | QTY | Description | Unit $ | Sub $ | Disc | Total $
//    列：序号 | 数量 | 产品 | 单价 | 小计(折前) | 折扣 | 合计(折后)
//    Font: Arial bold / 字体：Arial 加粗
//    Prices are GST-inclusive — no separate GST line / 含GST，不单独显示
// ============================================================
function buildInvoiceHTML(invNum, dateStr, storeName, items, s) {
  const F = 'font-family:Arial,Helvetica,sans-serif;font-weight:700;';

  const itemRows = items.map(({ product, qty, isExchange }, i) => {
    const sub = lineSub(product, qty, isExchange);
    const tot = lineAfterDisc(product, qty, isExchange);
    const dl  = discLabel(product, isExchange);

    // Exchange: grey italic row, $0 amounts / 换货行：灰色斜体，金额$0
    const rowStyle = isExchange ? 'opacity:0.75;' : '';
    const descCell = isExchange
      ? `[EX] ${product.name}`
      : product.name;

    const discColor = isExchange          ? '#9ca3af' :
      CAT_A.has(product.shorts)           ? '#ea580c' :
      product.shorts === 'Salt'           ? '#9333ea' :
      dl                                  ? '#2563eb' : '#9ca3af';

    // Highlight total cell when discounted / 有折扣时高亮合计列
    const totStyle = (!isExchange && sub !== tot) ? 'background:#fef9c3;' : '';

    // Unit price: always show real price so value is visible / 单价始终显示真实价格
    const unitDisplay = `$${product.price.toFixed(2)}`;
    const subDisplay  = isExchange ? '$0.00' : `$${sub.toFixed(2)}`;
    const totDisplay  = isExchange ? '$0.00' : `$${tot.toFixed(2)}`;

    return `
      <tr style="border-bottom:1px solid #e5e7eb;${rowStyle}">
        <td style="${F}font-size:12px;color:#9ca3af;padding:7px 3px 7px 5px;text-align:right;">${i + 1}</td>
        <td style="${F}font-size:15px;padding:7px 3px;text-align:center;">${qty}</td>
        <td style="${F}font-size:13px;padding:7px 5px;line-height:1.3;">${descCell}</td>
        <td style="${F}font-size:13px;padding:7px 3px;text-align:right;color:#374151;">${unitDisplay}</td>
        <td style="${F}font-size:13px;padding:7px 3px;text-align:right;color:#374151;">${subDisplay}</td>
        <td style="${F}font-size:13px;padding:7px 3px;text-align:center;color:${discColor};">${dl}</td>
        <td style="${F}font-size:14px;padding:7px 5px 7px 3px;text-align:right;${totStyle}">${totDisplay}</td>
      </tr>`;
  }).join('');

  // Payment badge / 支付标签
  const payBadge = isTransfer
    ? `<span style="${F}font-size:13px;background:#dbeafe;color:#1e40af;padding:4px 14px;border-radius:999px;">TRANSFER</span>`
    : `<span style="${F}font-size:13px;background:#dcfce7;color:#15803d;padding:4px 14px;border-radius:999px;">CASH</span>`;

  // Footer row builder (spans all 7 columns) / 页脚行构建（跨7列）
  const fRow = (label, value, size = '16px', color = '#111827', borderTop = false) => `
    <tr style="${borderTop ? 'border-top:2px solid #111827;' : ''}">
      <td colspan="6" style="${F}font-size:${size};padding:7px 4px 7px 0;text-align:right;color:${color};">${label}</td>
      <td style="${F}font-size:${size};padding:7px 5px;text-align:right;color:${color};">${value}</td>
    </tr>`;

  // Sub Total = all lines pre-discount / 小计 = 所有行打折前总和
  let footerRows = fRow('Sub Total', `$${s.subTotal.toFixed(2)}`);

  // Combined discount: Cat A 10% + Cat B global% / 合并折扣：含海苔10%
  if (s.discAmt > 0) {
    const discLabel = globalDiscount > 0
      ? `Discount (incl. ${globalDiscount}%)`
      : `Discount`;
    footerRows += fRow(discLabel, `-$${s.discAmt.toFixed(2)}`, '16px', '#2563eb');
  }

  if (!isTransfer) {
    if (s.cashRounding !== 0) {
      const absR = Math.abs(s.cashRounding).toFixed(2);
      const sign = s.cashRounding > 0 ? '+$' : '-$';
      footerRows += fRow('Cash Rounding', `${sign}${absR}`, '13px', '#9ca3af');
    }
    footerRows += fRow('Cash Total', `$${s.cashTotal.toFixed(2)}`, '22px', '#111827', true);
  } else {
    footerRows += fRow('Total', `$${s.totalAfterDisc.toFixed(2)}`, '22px', '#111827', true);
  }

  return `
    <div style="${F}background:#fff;border:1.5px solid #d1d5db;border-radius:8px;overflow:hidden;">

      <!-- Header / 发票头部 -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:16px 16px 12px;">
        <!-- Left: company + recipient / 左：公司信息与收件方 -->
        <div style="flex:1;min-width:0;padding-right:12px;">
          <div style="${F}font-size:20px;text-transform:uppercase;line-height:1.2;">Tax Invoice</div>
          <div style="margin-top:10px;">
            <div style="${F}font-size:13px;color:#374151;">From: Korean Foods P/L</div>
            <div style="${F}font-size:12px;color:#6b7280;margin-top:2px;">ABN 65 122 947 586</div>
          </div>
          <div style="margin-top:8px;">
            <div style="${F}font-size:12px;color:#9ca3af;">To:</div>
            <div style="${F}font-size:16px;color:#111827;text-decoration:underline;margin-top:1px;">${storeName}</div>
          </div>
        </div>
        <!-- Right: invoice # + date + badge / 右：发票号、日期、支付标签 -->
        <div style="text-align:right;flex-shrink:0;">
          <div style="${F}font-size:11px;color:#9ca3af;">Invoice #</div>
          <div style="${F}font-size:14px;color:#111827;letter-spacing:0.02em;">${invNum}</div>
          <div style="${F}font-size:12px;color:#6b7280;margin-top:4px;">Date: ${dateStr}</div>
          <div style="margin-top:8px;">${payBadge}</div>
        </div>
      </div>

      <!-- Line items table: # QTY Description Unit$ Sub$ Disc Total$ -->
      <!-- 产品明细：序号 数量 产品名 单价 小计 折扣 合计 -->
      <table style="width:100%;border-collapse:collapse;border-top:1.5px solid #d1d5db;">
        <thead>
          <tr style="background:#f3f4f6;border-bottom:1.5px solid #d1d5db;">
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px 7px 5px;text-align:right;width:24px;">#</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px;text-align:center;width:38px;">QTY</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 5px;text-align:left;">Description</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px;text-align:right;width:52px;">Unit $</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px;text-align:right;width:58px;">Sub $</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px;text-align:center;width:42px;">Disc</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 5px 7px 3px;text-align:right;width:62px;">Total $</th>
          </tr>
        </thead>
        <tbody>${itemRows}</tbody>
      </table>

      <!-- Footer / 页脚 -->
      <div style="border-top:1.5px solid #e5e7eb;padding:4px 14px 16px;">
        <table style="width:100%;border-collapse:collapse;">
          <tbody>${footerRows}</tbody>
        </table>
      </div>

    </div>`;
}


// ============================================================
// 10. GENERATE & MODAL ACTIONS / 生成发票与模态框操作
// ============================================================
let _currentInvoiceData = null;

function generateInvoice() {
  const { storeName, items, errors } = parseTextarea();

  if (items.length === 0) {
    alert(errors.length > 0
      ? 'No valid products found. Please check your input.'
      : 'Please enter products (line 2+).');
    return;
  }

  const invNum  = getInvNum(storeName);
  const d       = new Date();
  const dateStr = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  const s       = calcSummary(items);
  const html    = buildInvoiceHTML(invNum, dateStr, storeName, items, s);

  // Show parse warnings above invoice if any / 显示解析警告
  let warningHtml = '';
  if (errors.length > 0) {
    warningHtml = `<div class="mb-3 bg-yellow-50 border border-yellow-200 rounded-xl px-3 py-2">
      <p class="text-xs font-semibold text-yellow-700 mb-1">Skipped ${errors.length} unrecognized line(s):</p>
      ${errors.map(e => `<p class="text-xs text-yellow-600"><code>${e.line}</code> — ${e.msg}</p>`).join('')}
    </div>`;
  }

  document.getElementById('invoice-content').innerHTML = warningHtml + html;
  document.getElementById('invoice-modal').classList.remove('hidden');
  lucide.createIcons();

  _currentInvoiceData = {
    invNum, dateStr, storeName,
    orderText: document.getElementById('order-input').value,
    globalDiscount, isTransfer, summary: s, html,
  };

  // Persist state / 持久化状态
  localStorage.setItem('orderText_v2', document.getElementById('order-input').value);
  localStorage.setItem('disc_v2', String(globalDiscount));
  localStorage.setItem('transfer_v2', String(isTransfer));
}

function saveAndClose() {
  if (!_currentInvoiceData) return;
  saveInvoiceToDB(_currentInvoiceData, () => {
    alert(`Saved: ${_currentInvoiceData.invNum}`);
    closeModal();
  });
}

function closeModal() {
  document.getElementById('invoice-modal').classList.add('hidden');
}

function printInvoice() {
  const html = document.getElementById('invoice-content').innerHTML;
  const w = window.open('', '_blank', 'width=600,height=800');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>body{margin:20px;font-family:'Courier New',monospace;}@media print{body{margin:0;}}</style>
    </head><body>${html}
    <script>window.onload=function(){window.print();setTimeout(window.close,800);};<\/script>
    </body></html>`);
  w.document.close();
}


// ============================================================
// 11. INDEXEDDB — HISTORY / 历史发票
// ============================================================
let db = null;

function initDB(cb) {
  const req = indexedDB.open('SalesCalcDB', 2);
  req.onupgradeneeded = e => {
    const d = e.target.result;
    if (!d.objectStoreNames.contains('invoices')) {
      d.createObjectStore('invoices', { keyPath: 'invNum' });
    }
  };
  req.onsuccess = e => { db = e.target.result; if (cb) cb(); };
  req.onerror   = ()  => console.warn('IndexedDB unavailable');
}

function saveInvoiceToDB(data, cb) {
  if (!db) return;
  const tx = db.transaction('invoices', 'readwrite');
  tx.objectStore('invoices').put(data);
  tx.oncomplete = cb;
}

function openHistory() {
  document.getElementById('history-modal').classList.remove('hidden');
  renderHistory();
}

function closeHistory() {
  document.getElementById('history-modal').classList.add('hidden');
}

function renderHistory() {
  if (!db) return;
  const el  = document.getElementById('history-list');
  const req = db.transaction('invoices', 'readonly').objectStore('invoices').getAll();
  req.onsuccess = e => {
    const list = e.target.result.reverse();
    if (!list.length) {
      el.innerHTML = `<p class="text-center text-gray-300 text-sm py-12">No saved invoices</p>`;
      return;
    }
    el.innerHTML = list.map(inv => {
      const total = (inv.isTransfer
        ? inv.summary.totalAfterDisc
        : inv.summary.cashTotal).toFixed(2);
      const badge = inv.isTransfer
        ? `<span class="text-xs text-blue-500 font-semibold">Transfer</span>`
        : `<span class="text-xs text-green-600 font-semibold">Cash</span>`;
      return `
        <div class="flex items-center px-4 py-3.5 hover:bg-gray-50 active:bg-gray-100 cursor-pointer transition-colors"
             onclick="viewSavedInvoice('${inv.invNum}')">
          <div class="flex-1 min-w-0">
            <div class="text-sm font-mono font-bold text-gray-800 truncate">${inv.invNum}</div>
            <div class="flex items-center gap-1.5 mt-0.5">${badge}
              <span class="text-xs text-gray-400">${inv.dateStr}</span>
            </div>
          </div>
          <div class="text-base font-bold text-gray-700 ml-2">$${total}</div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300 ml-1"></i>
        </div>`;
    }).join('');
    lucide.createIcons();
  };
}

function viewSavedInvoice(invNum) {
  if (!db) return;
  const req = db.transaction('invoices', 'readonly').objectStore('invoices').get(invNum);
  req.onsuccess = e => {
    const inv = e.target.result;
    if (!inv) return;
    document.getElementById('invoice-content').innerHTML = inv.html;
    _currentInvoiceData = inv;
    closeHistory();
    document.getElementById('invoice-modal').classList.remove('hidden');
  };
}


// ============================================================
// 12. LOCALSTORAGE PERSISTENCE / 持久化
// ============================================================
function loadPersistedState() {
  const text = localStorage.getItem('orderText_v2');
  if (text) document.getElementById('order-input').value = text;
  globalDiscount = parseInt(localStorage.getItem('disc_v2') || '0', 10);
  isTransfer     = localStorage.getItem('transfer_v2') === 'true';
  renderControlButtons();
  onTextareaInput(); // refresh displays
}


// ============================================================
// 13. SERVICE WORKER (PWA) / 离线缓存
// ============================================================
(function() {
  if (!('serviceWorker' in navigator)) return;
  const code = `
    const C='msc-v2';
    const URLS=[
      'https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css',
      'https://unpkg.com/lucide@0.284.0/dist/umd/lucide.min.js'
    ];
    self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(URLS))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
  `;
  navigator.serviceWorker
    .register(URL.createObjectURL(new Blob([code], { type: 'application/javascript' })))
    .catch(() => {});
})();


// ============================================================
// 14. INIT / 初始化
// ============================================================
initDB(() => {
  loadPersistedState();
  lucide.createIcons();
});
</script>
