<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile viewport / 移动端视口 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>My Sales Calc</title>

  <!-- Tailwind CSS v2.2.19 (fixed) / 固定版本 -->
  <link rel="stylesheet" href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" />
  <!-- Lucide Icons v0.284.0 (fixed) / 固定版本图标 -->
  <script src="https://unpkg.com/lucide@0.284.0/dist/umd/lucide.min.js"></script>

  <style>
    /* Prevent iOS auto-zoom / 防止 iOS 输入框自动缩放 */
    textarea, input { font-size: 16px !important; }

    /* Textarea monospace / 等宽字体 */
    #order-input {
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.7;
      caret-color: #2563eb;
    }
    #order-input::placeholder { color: #d1d5db; }

    .btn-press:active { transform: scale(0.96); }

    @media print {
      .no-print { display: none !important; }
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

<!-- ============================================================ -->
<!-- TOP TAB NAVIGATION / 顶部导航栏                                 -->
<!-- ============================================================ -->
<nav class="fixed top-0 left-0 right-0 bg-white border-b border-gray-200 no-print" style="z-index:40;">
  <div class="max-w-lg mx-auto flex">
    <button id="tab-sales" onclick="switchTab('sales')"
      class="flex-1 py-2.5 flex flex-col items-center gap-0.5 text-blue-600 border-b-2 border-blue-600 btn-press">
      <i data-lucide="calculator" class="w-5 h-5"></i>
      <span class="text-xs font-semibold">Sales</span>
    </button>
    <button id="tab-van" onclick="switchTab('van')"
      class="flex-1 py-2.5 flex flex-col items-center gap-0.5 text-gray-400 border-b-2 border-transparent btn-press">
      <i data-lucide="truck" class="w-5 h-5"></i>
      <span class="text-xs font-medium">Van</span>
    </button>
    <button id="tab-expenses" onclick="switchTab('expenses')"
      class="flex-1 py-2.5 flex flex-col items-center gap-0.5 text-gray-400 border-b-2 border-transparent btn-press">
      <i data-lucide="receipt" class="w-5 h-5"></i>
      <span class="text-xs font-medium">Expenses</span>
    </button>
    <button id="tab-history" onclick="switchTab('history')"
      class="flex-1 py-2.5 flex flex-col items-center gap-0.5 text-gray-400 border-b-2 border-transparent btn-press">
      <i data-lucide="clock" class="w-5 h-5"></i>
      <span class="text-xs font-medium">History</span>
    </button>
  </div>
</nav>


<!-- ============================================================ -->
<!-- SALES PAGE / 销售计算器                                         -->
<!-- v1: original invoice calculator                              -->
<!-- ============================================================ -->
<div id="sales-page" class="max-w-lg mx-auto px-3 pt-16 pb-4">

  <!-- Order textarea card / 订单输入卡片 -->
  <div class="bg-white rounded-2xl shadow-sm px-4 pt-3 pb-2 mb-1">
    <div class="flex items-center justify-between mb-1.5">
      <div class="flex items-center gap-2 text-xs text-gray-400">
        <span class="bg-blue-100 text-blue-600 font-bold px-1.5 py-0.5 rounded text-xs">Line 1</span>
        <span>Store name</span>
        <span class="text-gray-200">|</span>
        <span class="bg-gray-100 text-gray-500 font-bold px-1.5 py-0.5 rounded text-xs">Line 2+</span>
        <span>Products</span>
      </div>
      <span id="inv-num-display" class="text-xs font-mono text-gray-400 truncate max-w-xs"></span>
    </div>

    <textarea id="order-input" rows="8"
      placeholder="TK&#10;c10&#10;wc 25&#10;rkc 1&#10;v 1 box&#10;j 2 box"
      class="w-full border border-gray-100 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent resize-none bg-gray-50"
      oninput="onTextareaInput()"></textarea>

    <div id="parse-errors" class="mt-1.5 hidden"></div>
  </div>

  <p class="text-xs text-gray-400 px-1 mb-3">
    Spaces OK — <code class="bg-gray-100 px-1 rounded">v 1 box</code> = <code class="bg-gray-100 px-1 rounded">v1box</code>
  </p>

  <!-- Discount & Payment controls / 折扣与支付控制 -->
  <div class="bg-white rounded-2xl shadow-sm px-4 py-3 mb-3">
    <!-- Discount row / 折扣行 -->
    <div class="flex items-center gap-2 mb-2.5">
      <span class="text-xs text-gray-400 font-medium w-16 shrink-0">Discount:</span>
      <button id="btn-disc-2" onclick="setDiscount(2)"
        class="px-3 py-1.5 rounded-xl text-xs font-bold border border-gray-200 text-gray-600 bg-white btn-press transition-colors">
        2% Off
      </button>
      <button id="btn-disc-4" onclick="setDiscount(4)"
        class="px-3 py-1.5 rounded-xl text-xs font-bold border border-gray-200 text-gray-600 bg-white btn-press transition-colors">
        4% Off
      </button>
    </div>
    <!-- Payment row / 支付方式行 (Cash default active) -->
    <div class="flex items-center gap-2">
      <span class="text-xs text-gray-400 font-medium w-16 shrink-0">Pay:</span>
      <button id="btn-pay-cash" onclick="setPayment('cash')"
        class="px-3 py-1.5 rounded-xl text-xs font-bold border btn-press transition-colors bg-green-600 text-white border-green-600">
        Cash
      </button>
      <button id="btn-pay-transfer" onclick="setPayment('transfer')"
        class="px-3 py-1.5 rounded-xl text-xs font-bold border border-gray-200 text-gray-600 bg-white btn-press transition-colors">
        Transfer
      </button>
      <button id="btn-pay-cheque" onclick="setPayment('cheque')"
        class="px-3 py-1.5 rounded-xl text-xs font-bold border border-gray-200 text-gray-600 bg-white btn-press transition-colors">
        Cheque
      </button>
    </div>
  </div>

  <!-- Generate button / 生成按钮 -->
  <button onclick="generateInvoice()"
    class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl text-base font-bold btn-press transition-colors flex items-center justify-center gap-2 mb-2">
    <i data-lucide="file-text" class="w-5 h-5"></i>
    Generate Invoice
  </button>

  <!-- Clear / 清空 -->
  <button onclick="clearAll()"
    class="w-full text-red-400 text-sm font-medium py-2 btn-press">
    Clear
  </button>

</div>


<!-- ============================================================ -->
<!-- VAN SALES PAGE / 车销管理                                       -->
<!-- v2: morning load-in, settlement, inventory                   -->
<!-- ============================================================ -->
<div id="van-page" class="hidden max-w-lg mx-auto px-3 pt-16 pb-24">

  <!-- Header / 标题行 -->
  <div class="flex items-center justify-between mb-3">
    <h1 class="text-xl font-bold text-gray-800 tracking-tight">Van Sales</h1>
    <span id="van-date" class="text-xs font-mono text-gray-400"></span>
  </div>

  <!-- Morning Load-In / 出货录入 -->
  <div class="bg-white rounded-2xl shadow-sm px-4 py-3 mb-3">
    <div class="flex items-center justify-between mb-2">
      <h2 class="font-bold text-gray-700 text-sm">Morning Load-In / 出货录入</h2>
      <button id="btn-edit-load" onclick="editLoadIn()"
        class="hidden text-xs text-blue-500 font-semibold btn-press border border-blue-200 px-2 py-1 rounded-lg">
        ✏ Edit
      </button>
    </div>
    <!-- Scrollable product list / 可滚动产品列表 -->
    <div id="load-in-form" style="max-height:52vh;overflow-y:auto;"></div>
    <button id="btn-save-load" onclick="saveLoadIn()"
      class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm mt-3 btn-press">
      ✓ Confirm Load-In
    </button>
  </div>

  <!-- Today's Sales Summary / 今日销售汇总 -->
  <div class="bg-white rounded-2xl shadow-sm px-4 py-3 mb-3">
    <h2 class="font-bold text-gray-700 text-sm mb-2">Today's Sales / 今日销售</h2>
    <div id="sales-summary"></div>
  </div>

  <!-- Inventory Status / 库存余量 -->
  <div class="bg-white rounded-2xl shadow-sm px-4 py-3 mb-3">
    <h2 class="font-bold text-gray-700 text-sm mb-2">Inventory / 库存余量</h2>
    <div id="inventory-table"></div>
  </div>


</div>

<!-- Van bottom action bar / Van页底部操作栏 -->
<div id="van-action-bar"
  class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-3 flex gap-3 no-print"
  style="z-index:40;">
  <button onclick="generateSummary()"
    class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold text-sm btn-press flex items-center justify-center gap-2">
    <i data-lucide="clipboard" class="w-4 h-4"></i> Summary
  </button>
  <button onclick="clearDay()"
    class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold text-sm btn-press flex items-center justify-center gap-2">
    <i data-lucide="trash-2" class="w-4 h-4"></i> Clear Day
  </button>
</div>


<!-- ============================================================ -->
<!-- HISTORY PAGE / 历史记录页                                       -->
<!-- ============================================================ -->
<div id="history-page" class="hidden max-w-lg mx-auto px-3 pt-16 pb-4">
  <div class="flex items-center justify-between mb-3">
    <h1 class="text-xl font-bold text-gray-800 tracking-tight">Invoice History</h1>
    <div class="flex gap-2">
      <button id="history-delete-btn" onclick="deleteSelected()"
        class="hidden bg-red-500 text-white px-3 py-1.5 rounded-lg text-sm font-bold btn-press">
        Delete (<span id="selected-count">0</span>)
      </button>
      <button id="history-summary-btn" onclick="summarySelected()"
        class="hidden bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold btn-press">
        Summary
      </button>
    </div>
  </div>
  <div class="mb-3 relative">
    <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-2.5 top-3 pointer-events-none"></i>
    <input id="history-filter" type="search" placeholder="Filter by store…"
      class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm pl-8"
      oninput="renderHistoryPage()">
  </div>
  <div id="history-list-page" class="bg-white rounded-2xl shadow-sm overflow-hidden divide-y divide-gray-50"></div>
</div>


<!-- ============================================================ -->
<!-- EXPENSES PAGE / 日常报销                                        -->
<!-- ============================================================ -->
<div id="expenses-page" class="hidden max-w-lg mx-auto px-3 pt-16 pb-6">
  <h1 class="text-xl font-bold text-gray-800 tracking-tight mb-3">Expenses / 今日报销</h1>
  <div class="bg-white rounded-2xl shadow-sm px-4 py-4 space-y-5">

    <!-- Lunch (fixed label) -->
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-orange-50 flex items-center justify-center shrink-0">
        <i data-lucide="utensils" class="w-5 h-5 text-orange-400"></i>
      </div>
      <div class="flex-1">
        <div class="text-xs text-gray-500 font-semibold mb-1">Lunch / 午餐</div>
        <div class="flex items-center border-b border-gray-200 focus-within:border-blue-400 pb-1">
          <span class="text-gray-400 text-sm mr-1">$</span>
          <input id="exp-lunch" type="number" step="0.01" min="0" placeholder="0.00"
            class="flex-1 text-sm font-mono font-bold border-0 focus:outline-none bg-transparent"
            oninput="saveExpenses()" onblur="fmtExp(this)">
        </div>
      </div>
    </div>

    <!-- Petrol (fixed label) -->
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center shrink-0">
        <i data-lucide="fuel" class="w-5 h-5 text-blue-400"></i>
      </div>
      <div class="flex-1">
        <div class="text-xs text-gray-500 font-semibold mb-1">Petrol / 汽油</div>
        <div class="flex items-center border-b border-gray-200 focus-within:border-blue-400 pb-1">
          <span class="text-gray-400 text-sm mr-1">$</span>
          <input id="exp-petrol" type="number" step="0.01" min="0" placeholder="0.00"
            class="flex-1 text-sm font-mono font-bold border-0 focus:outline-none bg-transparent"
            oninput="saveExpenses()" onblur="fmtExp(this)">
        </div>
      </div>
    </div>

    <!-- Others 1 (editable label) -->
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center shrink-0">
        <i data-lucide="package-2" class="w-5 h-5 text-purple-400"></i>
      </div>
      <div class="flex-1">
        <input id="exp-label1" type="text" maxlength="24" placeholder="Others"
          class="text-xs text-gray-500 font-semibold bg-transparent border-0 focus:outline-none focus:text-purple-500 w-full mb-1 block"
          oninput="saveExpenses()">
        <div class="flex items-center border-b border-gray-200 focus-within:border-blue-400 pb-1">
          <span class="text-gray-400 text-sm mr-1">$</span>
          <input id="exp-others" type="number" step="0.01" min="0" placeholder="0.00"
            class="flex-1 text-sm font-mono font-bold border-0 focus:outline-none bg-transparent"
            oninput="saveExpenses()" onblur="fmtExp(this)">
        </div>
      </div>
    </div>

    <!-- Others 2 (editable label) -->
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-teal-50 flex items-center justify-center shrink-0">
        <i data-lucide="tag" class="w-5 h-5 text-teal-400"></i>
      </div>
      <div class="flex-1">
        <input id="exp-label2" type="text" maxlength="24" placeholder="Others"
          class="text-xs text-gray-500 font-semibold bg-transparent border-0 focus:outline-none focus:text-teal-500 w-full mb-1 block"
          oninput="saveExpenses()">
        <div class="flex items-center border-b border-gray-200 focus-within:border-blue-400 pb-1">
          <span class="text-gray-400 text-sm mr-1">$</span>
          <input id="exp-others2" type="number" step="0.01" min="0" placeholder="0.00"
            class="flex-1 text-sm font-mono font-bold border-0 focus:outline-none bg-transparent"
            oninput="saveExpenses()" onblur="fmtExp(this)">
        </div>
      </div>
    </div>

  </div>

  <!-- Total -->
  <div class="bg-blue-50 rounded-2xl px-4 py-3 mt-3 flex items-center justify-between">
    <span class="text-sm font-semibold text-blue-700">Total Expenses</span>
    <span id="exp-total" class="text-lg font-mono font-bold text-blue-700">$0.00</span>
  </div>
</div>


<!-- ============================================================ -->
<!-- INVOICE MODAL / 发票预览（全屏）                                 -->
<!-- ============================================================ -->
<div id="invoice-modal"
  class="fixed inset-0 hidden bg-white flex flex-col" style="z-index:50;">

  <div class="flex items-center justify-between px-4 py-3 border-b bg-white shrink-0 no-print">
    <span class="font-bold text-gray-800 text-base">Invoice</span>
    <div class="flex gap-2 items-center">
<button onclick="saveAndClose()"
        class="bg-green-600 text-white px-3 py-2 rounded-xl text-sm font-bold btn-press flex items-center gap-1">
        <i data-lucide="save" class="w-4 h-4"></i>Save
      </button>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 btn-press p-1">
        <i data-lucide="x" class="w-6 h-6"></i>
      </button>
    </div>
  </div>

  <div class="overflow-y-auto flex-1 bg-white">
    <div id="invoice-content" class="p-3"></div>
  </div>
</div>




<!-- ============================================================ -->
<!-- SUMMARY MODAL / 日结文本摘要                                    -->
<!-- ============================================================ -->
<div id="summary-modal"
  class="fixed inset-0 hidden bg-black bg-opacity-60 flex items-center justify-center px-4" style="z-index:50;">
  <div class="bg-white w-full max-w-md rounded-2xl p-4">
    <div class="flex items-center justify-between mb-3">
      <div>
        <span class="font-bold text-gray-800">Day Summary · <span id="summary-date-title" class="text-blue-600"></span></span>
        <span id="summary-total-count" class="text-xs text-gray-400 ml-1 font-normal"></span>
      </div>
      <button onclick="closeSummaryModal()" class="text-gray-400 hover:text-gray-600 btn-press p-1">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <div class="overflow-auto max-h-56">
      <table class="w-full text-sm border-collapse">
        <thead>
          <tr class="border-b-2 border-gray-200 text-xs text-gray-500 bg-white">
            <th class="text-left pb-2 font-semibold w-7">#</th>
            <th class="text-left pb-2 font-semibold">Store</th>
            <th class="text-right pb-2 font-semibold font-mono">Amount</th>
            <th class="text-right pb-2 font-semibold w-8">T/E/Q</th>
          </tr>
        </thead>
        <tbody id="summary-rows"></tbody>
        <tfoot id="summary-foot"></tfoot>
      </table>
    </div>
    <!-- Audit / 对账框 -->
    <div id="summary-audit" class="hidden mt-3 pt-3 border-t-2 border-dashed border-gray-200 text-sm font-mono"></div>
    <textarea id="summary-text" readonly aria-hidden="true"
      class="opacity-0 absolute w-0 h-0 overflow-hidden" tabindex="-1"></textarea>
    <button onclick="copySummary()"
      class="w-full mt-3 bg-blue-600 text-white py-3 rounded-xl font-bold text-sm btn-press">
      📋 Copy to Clipboard
    </button>
  </div>
</div>

  { no:58, shorts:'2lb',   name:'Chilli Powder 908g',                 price:10.45, eaBox:18 },
  { no:59, shorts:'5lb',   name:'Chilli Powder 2.27kg',               price:24.75, eaBox:8  },
];

// Category A: auto 10% off, excluded from global discount / 固定9折，不参与全局折扣
const CAT_A = new Set(['P', 'J', 'N']);

// Longest-match parsing: sort by shortcode length descending / 最长匹配：按快捷码长度降序
// '1.5' added as alias for '1.5K' so both "1.5 10" and "1.5k10" work
// '1.5' 作为 '1.5K' 的别名，支持两种输入方式
const SORTED_PRODUCTS = [
  ...PRODUCTS,
  { ...PRODUCTS.find(p => p.shorts === '1.5K'), shorts: '1.5' },
].sort((a, b) => b.shorts.length - a.shorts.length);

// ============================================================
// 2. STATE / 应用状态
// ============================================================
let globalDiscount  = 0;       // 0 | 2 | 4
let paymentType     = 'cash';  // 'cash' | 'transfer' | 'cheque'
let currentTab      = 'sales';
let selectedKeys    = new Set();
let expenses        = { lunch: 0, petrol: 0, others: 0, others2: 0, label1: '', label2: '' };


// ============================================================
// 3. COMMAND PARSING / 快捷码解析
//    Format: [ex?][ShortCode][Quantity][box?]
//    "ex" prefix = exchange item ($0 on invoice) / "ex"前缀=换货
// ============================================================
function parseCommand(raw) {
  const cmd = raw.trim().toLowerCase().replace(/\s+/g, '');
  if (!cmd) return { error: 'empty' };

  let isExchange = false;
  let lookup     = cmd;
  if (cmd.startsWith('ex') && cmd.length > 2) {
    isExchange = true;
    lookup     = cmd.slice(2);
  }

  for (const product of SORTED_PRODUCTS) {
    const sc = product.shorts.toLowerCase();
    if (!lookup.startsWith(sc)) continue;

    const rest = lookup.slice(sc.length);
    if (!rest) return { error: `Missing qty after "${product.shorts}"` };

    const boxM = rest.match(/^(\d+)box$/);
    const eaM  = rest.match(/^(\d+)(ea)?$/);

    if (boxM) return { product, qty: parseInt(boxM[1], 10) * product.eaBox, isExchange };
    if (eaM) {
      const qty = parseInt(eaM[1], 10);
      if (qty <= 0) return { error: 'Qty must be > 0' };
      return { product, qty, isExchange };
    }
  }

  return { error: `Unknown: "${raw.trim()}"` };
}


// ============================================================
// 4. TEXTAREA PARSING / 多行输入解析
//    Line 1 → store name / Lines 2+ → product commands
// ============================================================
function parseTextarea() {
  const raw   = document.getElementById('order-input').value;
  const lines = raw.split('\n').map(l => l.trim());

  let storeName = '';
  let startIdx  = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i]) { storeName = lines[i]; startIdx = i + 1; break; }
  }

  const items  = [];
  const errors = [];

  for (let i = startIdx; i < lines.length; i++) {
    if (!lines[i]) continue;
    const result = parseCommand(lines[i]);
    if (result.error) {
      if (result.error !== 'empty') errors.push({ line: lines[i], msg: result.error });
      continue;
    }
    const existing = items.find(it =>
      it.product.shorts === result.product.shorts && it.isExchange === result.isExchange
    );
    if (existing) existing.qty += result.qty;
    else items.push({ product: result.product, qty: result.qty, isExchange: result.isExchange });
  }

  return { storeName, items, errors };
}


// ============================================================
// 5. CALCULATIONS / 金额计算 (all prices GST-inclusive / 含GST)
// ============================================================
function lineSub(product, qty, isExchange) {
  if (isExchange) return 0;
  return product.price * qty;
}

function lineAfterDisc(product, qty, isExchange) {
  if (isExchange) return 0;
  if (CAT_A.has(product.shorts)) return product.price * qty * 0.9;
  if (product.shorts !== 'Salt' && globalDiscount > 0) return product.price * qty * (1 - globalDiscount / 100);
  return product.price * qty;
}

function discLabel(product, isExchange) {
  if (isExchange)                return '-';
  if (CAT_A.has(product.shorts)) return '10%';
  if (product.shorts === 'Salt') return 'Special';
  if (globalDiscount > 0)        return `${globalDiscount}%`;
  return '';
}

function calcSummary(items) {
  let subTotal       = 0;
  let totalAfterDisc = 0;
  let catADiscAmt    = 0; // Seaweed 10% / 海苔10%折扣额
  let catBDiscAmt    = 0; // Others global% / 普通产品全局折扣额

  items.forEach(({ product, qty, isExchange }) => {
    subTotal       += lineSub(product, qty, isExchange);
    totalAfterDisc += lineAfterDisc(product, qty, isExchange);
    if (!isExchange && CAT_A.has(product.shorts)) {
      catADiscAmt += product.price * qty * 0.1;
    }
    if (!isExchange && !CAT_A.has(product.shorts) && product.shorts !== 'Salt' && globalDiscount > 0) {
      catBDiscAmt += product.price * qty * (globalDiscount / 100);
    }
  });

  const discAmt = subTotal - totalAfterDisc;

  // Australian cash rounding (nearest $0.05), only for Cash / 澳洲现金取整，仅Cash模式
  let cashRounding = 0;
  let cashTotal    = totalAfterDisc;
  if (paymentType === 'cash') {
    cashTotal    = Math.round(totalAfterDisc * 20) / 20;
    cashRounding = parseFloat((cashTotal - totalAfterDisc).toFixed(2));
  }

  return { subTotal, discAmt, catADiscAmt, catBDiscAmt, totalAfterDisc, cashRounding, cashTotal };
}

function onTextareaInput() {
  const { storeName, errors } = parseTextarea();

  document.getElementById('inv-num-display').textContent = storeName ? inv : '';

  // Parse errors / 解析错误

  else {
    errEl.classList.remove('hidden');

      `<div class="flex items-start gap-1 text-xs text-red-400 py-0.5">

         <span><code class="bg-red-50 px-1 rounded">${e.line}</code> — ${e.msg}</span>
       </div>`
    ).join('');

  // Persist to localStorage / 持久化
  localStorage.setItem('orderText_v2', document.getElementById('order-input').value);

}

// 8. INVOICE NUMBER / 发票号
//    Format: DDMMYY + store name (uppercase, alphanumeric only)
//    格式：DDMMYY + 店名大写（仅保留字母数字）
// ============================================================
function normalizeStore(name) {
  return name.toUpperCase().replace(/[^A-Z0-9]/g, '');
}

function getInvNum(storeName) {
  const d  = new Date();
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yy = String(d.getFullYear()).slice(-2);
  return `${dd}${mm}${yy}${normalizeStore(storeName)}`;
}


// ============================================================
// 9. INVOICE HTML BUILDER / 发票HTML构建
//    Columns: # | QTY | Description | Unit $ | Sub $ | Disc | Total $
// ============================================================
function buildInvoiceHTML(invNum, dateStr, storeName, items, s) {
  const F = 'font-family:Arial,Helvetica,sans-serif;font-weight:700;';

  const itemRows = items.map(({ product, qty, isExchange }, i) => {
    const sub = lineSub(product, qty, isExchange);
    const tot = lineAfterDisc(product, qty, isExchange);
    const dl  = discLabel(product, isExchange);

    const rowStyle  = isExchange ? 'opacity:0.75;' : '';
    const descCell  = isExchange ? `[EX] ${product.name}` : product.name;
    const discColor = isExchange          ? '#9ca3af' :
      CAT_A.has(product.shorts)           ? '#ea580c' :
      product.shorts === 'Salt'           ? '#9333ea' :
      dl                                  ? '#2563eb' : '#9ca3af';
    const totStyle  = (!isExchange && sub !== tot) ? 'background:#fef9c3;' : '';

    const unitDisplay = `$${product.price.toFixed(2)}`;
    const subDisplay  = isExchange ? '$0.00' : `$${sub.toFixed(2)}`;
    const totDisplay  = isExchange ? '$0.00' : `$${tot.toFixed(2)}`;

    return `
      <tr style="border-bottom:1px solid #e5e7eb;${rowStyle}">
        <td style="${F}font-size:12px;color:#9ca3af;padding:7px 3px 7px 5px;text-align:right;">${i + 1}</td>
        <td style="${F}font-size:15px;padding:7px 3px;text-align:center;">${qty}</td>
        <td style="${F}font-size:13px;padding:7px 5px;line-height:1.3;">${descCell}</td>
        <td style="${F}font-size:13px;padding:7px 3px;text-align:right;color:#374151;">${unitDisplay}</td>
        <td style="${F}font-size:13px;padding:7px 3px;text-align:right;color:#374151;">${subDisplay}</td>
        <td style="${F}font-size:13px;padding:7px 3px;text-align:center;color:${discColor};">${dl}</td>
        <td style="${F}font-size:14px;padding:7px 5px 7px 3px;text-align:right;${totStyle}">${totDisplay}</td>
      </tr>`;
  }).join('');

  // Payment badge / 支付标签
  const payBadgeMap = {
    cash:     { bg: '#dcfce7', color: '#15803d', label: 'CASH' },
    transfer: { bg: '#dbeafe', color: '#1e40af', label: 'TRANSFER' },
    cheque:   { bg: '#fef3c7', color: '#92400e', label: 'CHEQUE' },
  };
  const pb       = payBadgeMap[paymentType] || payBadgeMap.cash;
  const payBadge = `<span style="${F}font-size:13px;background:${pb.bg};color:${pb.color};padding:4px 14px;border-radius:999px;">${pb.label}</span>`;

  // Footer row helper / 页脚行构建
  const fRow = (label, value, size = '16px', color = '#111827', borderTop = false) => `
    <tr style="${borderTop ? 'border-top:2px solid #111827;' : ''}">
      <td colspan="6" style="${F}font-size:${size};padding:7px 4px 7px 0;text-align:right;color:${color};">${label}</td>
      <td style="${F}font-size:${size};padding:7px 5px;text-align:right;color:${color};">${value}</td>
    </tr>`;

  let footerRows = fRow('Sub Total', `$${s.subTotal.toFixed(2)}`);

  // Discount breakdown / 折扣明细
  if (s.discAmt > 0) {
    footerRows += fRow('Discount', `-$${s.discAmt.toFixed(2)}`, '16px', '#2563eb');
    if (s.catBDiscAmt > 0) {
      footerRows += fRow(`↳ Others ${globalDiscount}% Off`, `-$${s.catBDiscAmt.toFixed(2)}`, '13px', '#2563eb');
    }
    if (s.catADiscAmt > 0) {
      footerRows += fRow('↳ Seaweed 10% Off', `-$${s.catADiscAmt.toFixed(2)}`, '13px', '#ea580c');
    }
  }

  // Cash: rounding + Cash Total / Transfer & Cheque: Total only
  if (paymentType === 'cash') {
    if (s.cashRounding !== 0) {
      const absR = Math.abs(s.cashRounding).toFixed(2);
      const sign = s.cashRounding > 0 ? '+$' : '-$';
      footerRows += fRow('Cash Rounding', `${sign}${absR}`, '13px', '#9ca3af');
    }
    footerRows += fRow('Cash Total', `$${s.cashTotal.toFixed(2)}`, '22px', '#111827', true);
  } else {
    footerRows += fRow('Total', `$${s.totalAfterDisc.toFixed(2)}`, '22px', '#111827', true);
  }

  return `
    <div style="${F}background:#fff;border:1.5px solid #d1d5db;border-radius:8px;overflow:hidden;">

      <!-- Header / 发票头部 -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:16px 16px 12px;">
        <div style="flex:1;min-width:0;padding-right:12px;">
          <div style="${F}font-size:20px;text-transform:uppercase;line-height:1.2;">Tax Invoice</div>
          <div style="margin-top:10px;">
            <div style="${F}font-size:13px;color:#374151;">From: Korean Foods P/L</div>
            <div style="${F}font-size:12px;color:#6b7280;margin-top:2px;">ABN 65 122 947 586</div>
          </div>
          <div style="margin-top:8px;">
            <div style="${F}font-size:12px;color:#9ca3af;">To:</div>
            <div style="${F}font-size:16px;color:#111827;text-decoration:underline;margin-top:1px;">${storeName}</div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="${F}font-size:11px;color:#9ca3af;">Invoice #</div>
          <div style="${F}font-size:14px;color:#111827;letter-spacing:0.02em;">${invNum}</div>
          <div style="${F}font-size:12px;color:#6b7280;margin-top:4px;">Date: ${dateStr}</div>
          <div style="margin-top:8px;">${payBadge}</div>
        </div>
      </div>

      <!-- Line items / 产品明细 -->
      <table style="width:100%;border-collapse:collapse;border-top:1.5px solid #d1d5db;">
        <thead>
          <tr style="background:#f3f4f6;border-bottom:1.5px solid #d1d5db;">
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px 7px 5px;text-align:right;width:24px;">#</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px;text-align:center;width:38px;">QTY</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 5px;text-align:left;">Description</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px;text-align:right;width:52px;">Unit $</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px;text-align:right;width:58px;">Sub $</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 3px;text-align:center;width:42px;">Disc</th>
            <th style="${F}font-size:11px;color:#6b7280;padding:7px 5px 7px 3px;text-align:right;width:62px;">Total $</th>
          </tr>
        </thead>
        <tbody>${itemRows}</tbody>
      </table>

      <!-- Footer / 页脚 -->
      <div style="border-top:1.5px solid #e5e7eb;padding:4px 14px 16px;">
        <table style="width:100%;border-collapse:collapse;">
          <tbody>${footerRows}</tbody>
        </table>
      </div>

    </div>`;
}

// ============================================================
let _currentInvoiceData = null;

function generateInvoice() {
  const { storeName, items, errors } = parseTextarea();

  if (items.length === 0) {
    alert(errors.length > 0
      ? 'No valid products found. Please check your input.'
      : 'Please enter products (line 2+).');
    return;
  }

  const invNum  = getInvNum(storeName);
  const d       = new Date();
  const dateStr = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  const s       = calcSummary(items);
  const html    = buildInvoiceHTML(invNum, dateStr, storeName, items, s);

  let warningHtml = '';
  if (errors.length > 0) {
    warningHtml = `<div class="mb-3 bg-yellow-50 border border-yellow-200 rounded-xl px-3 py-2">
      <p class="text-xs font-semibold text-yellow-700 mb-1">Skipped ${errors.length} unrecognized line(s):</p>
      ${errors.map(e => `<p class="text-xs text-yellow-600"><code>${e.line}</code> — ${e.msg}</p>`).join('')}
    </div>`;
  }

  document.getElementById('invoice-content').innerHTML = warningHtml + html;
  document.getElementById('invoice-modal').classList.remove('hidden');
  lucide.createIcons();

  _currentInvoiceData = {
    invNum, dateStr, storeName,
    orderText:     document.getElementById('order-input').value,
    globalDiscount,
    paymentType,   // replaces old isTransfer / 替换旧的 isTransfer
    summary: s,
    html,
  };

  localStorage.setItem('orderText_v2', document.getElementById('order-input').value);
  localStorage.setItem('disc_v2',      String(globalDiscount));
  localStorage.setItem('payType_v2',   paymentType);
}

function saveAndClose() {
  if (!_currentInvoiceData) return;
  saveInvoiceToDB(_currentInvoiceData, () => {
    alert(`Saved: ${_currentInvoiceData.invNum}`);
    closeModal();
    if (currentTab === 'van')     renderVanPage();
    if (currentTab === 'history') renderHistoryPage();
  });
}

function closeModal() {
  document.getElementById('invoice-modal').classList.add('hidden');
}

function printInvoice() {
  const html = document.getElementById('invoice-content').innerHTML;
  const w = window.open('', '_blank', 'width=600,height=800');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>body{margin:20px;font-family:'Courier New',monospace;}@media print{body{margin:0;}}</style>
    </head><body>${html}

// 11. INDEXEDDB — HISTORY / 历史发票
// ============================================================
let db = null;

function initDB(cb) {
  const req = indexedDB.open('SalesCalcDB', 2);
  req.onupgradeneeded = e => {
    const d = e.target.result;
    if (!d.objectStoreNames.contains('invoices')) {
      d.createObjectStore('invoices', { keyPath: 'invNum' });
    }
  };
  req.onsuccess = e => { db = e.target.result; if (cb) cb(); };
  req.onerror   = ()  => console.warn('IndexedDB unavailable');
}

function saveInvoiceToDB(data, cb) {
  if (!db) return;
  const tx = db.transaction('invoices', 'readwrite');
  tx.objectStore('invoices').put(data);
  tx.oncomplete = cb;
}

// Backward compat: old invoices have isTransfer bool, new have paymentType
// 向后兼容：旧发票有isTransfer布尔值，新发票有paymentType字符串
function getInvPayType(inv) {
  if (inv.paymentType) return inv.paymentType;
  return inv.isTransfer ? 'transfer' : 'cash';
}

function getInvTotal(inv) {
  return getInvPayType(inv) === 'cash' ? inv.summary.cashTotal : inv.summary.totalAfterDisc;

    let list = e.target.result.reverse();

        html += `
          <div class="flex items-center px-3 py-3 transition-colors" ${zebra}>
            <div onclick="toggleSelect('${inv.invNum}')"
              style="width:20px;height:20px;border-radius:5px;border:2px solid;${chkBg};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-right:10px;">
              ${chkMark}
            </div>
            <div class="flex-1 min-w-0 cursor-pointer" onclick="viewSavedInvoice('${inv.invNum}')">
              <div class="text-sm font-bold text-gray-800 truncate">${store}</div>
              <div class="flex items-center gap-1.5 mt-0.5 flex-wrap">
                ${badge}
                <span class="text-xs text-gray-400 font-mono">${inv.invNum}</span>
              </div>
            </div>
            <div class="text-sm font-bold text-gray-700 ml-2 shrink-0">$${total}</div>
            <button onclick="editInvoice('${inv.invNum}')"
              class="ml-2 p-1.5 text-gray-300 hover:text-blue-500 btn-press shrink-0">
              <i data-lucide="pencil" class="w-4 h-4"></i>
            </button>
            <button onclick="deleteInvoice('${inv.invNum}')"
              class="ml-1 p-1.5 text-gray-300 hover:text-red-500 btn-press shrink-0">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>`;
      });
    });
    el.innerHTML = html;
    lucide.createIcons();
  };
}

function viewSavedInvoice(invNum) {
  if (!db) return;
  const req = db.transaction('invoices', 'readonly').objectStore('invoices').get(invNum);
  req.onsuccess = e => {
    const inv = e.target.result;
    if (!inv) return;
    document.getElementById('invoice-content').innerHTML = inv.html;
    _currentInvoiceData = inv;
    document.getElementById('invoice-modal').classList.remove('hidden');
  };
}

function editInvoice(invNum) {
  if (!db) return;
  const req = db.transaction('invoices', 'readonly').objectStore('invoices').get(invNum);
  req.onsuccess = e => {
    const inv = e.target.result;
    if (!inv) return;
    document.getElementById('order-input').value = inv.orderText || '';
    globalDiscount = inv.globalDiscount || 0;
    paymentType    = getInvPayType(inv);
    renderControlButtons();
    onTextareaInput();
    switchTab('sales');
  };
}

function deleteInvoice(invNum) {
  if (!confirm(`Delete invoice ${invNum}?`)) return;
  if (!db) return;
  const tx = db.transaction('invoices', 'readwrite');
  tx.objectStore('invoices').delete(invNum);
  tx.oncomplete = () => {
    selectedKeys.delete(invNum);
    updateSelectionUI();
    renderHistoryPage();
  };
}

function updateSelectionUI() {
  const count = selectedKeys.size;
  document.getElementById('selected-count').textContent = count;
  const show = count > 0;
  document.getElementById('history-delete-btn').classList.toggle('hidden', !show);
  document.getElementById('history-summary-btn').classList.toggle('hidden', !show);
}

function toggleSelect(invNum) {
  if (selectedKeys.has(invNum)) {
    selectedKeys.delete(invNum);
  } else {
    selectedKeys.add(invNum);
  }
  updateSelectionUI();
  renderHistoryPage();
}

function deleteSelected() {
  if (!db || !selectedKeys.size) return;
  const keys = [...selectedKeys];
  const names = keys.join(', ');
  if (!confirm(`Delete ${keys.length} invoice(s)?\n\n${names}`)) return;
  let pending = keys.length;
  keys.forEach(invNum => {
    const tx = db.transaction('invoices', 'readwrite');
    tx.objectStore('invoices').delete(invNum);
    tx.oncomplete = () => {
      selectedKeys.delete(invNum);
      if (--pending === 0) {
        updateSelectionUI();
        renderHistoryPage();
      }
    };
  });
}

function summarySelected() {
  if (!db || !selectedKeys.size) return;
  const keys    = [...selectedKeys];
  const results = [];
  let pending   = keys.length;
  keys.forEach(invNum => {
    const req = db.transaction('invoices', 'readonly').objectStore('invoices').get(invNum);
    req.onsuccess = e => {
      if (e.target.result) results.push(e.target.result);
      if (--pending === 0) {
        results.sort((a, b) => a.invNum.localeCompare(b.invNum));
        renderSummaryModal(results, null, null);
      }
    };
  });
}

function getTodayPrefix() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getFullYear()).slice(-2)}`;
}

function getTodayDateStr() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

// --- Tab navigation / 标签页导航 ---

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('sales-page').classList.toggle('hidden',    tab !== 'sales');
  document.getElementById('van-page').classList.toggle('hidden',      tab !== 'van');
  document.getElementById('history-page').classList.toggle('hidden',  tab !== 'history');

// --- Load-In / 出货录入 ---

// Priority order for the load-in form / 出货录入的产品显示顺序
const VAN_ORDER = ['C','WC','95','1.5K','V','RKC','BOC','SS','DRS','BF','RSS','FG','SQ','N','GG','PG','J','P','S','VS','M','B'];

// ea-only: sold loose, no box concept / 只卖散货，无整箱概念
const EA_ONLY  = new Set(['SS','DRS','BF','RSS','FG','SQ','GG','PG','PGS','CG','LR','SO','0.5lb','1lb','2lb','5lb']);
// box-only: always sold by full box / 只按整箱卖
const BOX_ONLY = new Set(['S','VS','M','B','J','P']);

const LOAD_IN_KEY = () => `loadIn_${getTodayPrefix()}`;

function getLoadIn() {
  const d = localStorage.getItem(LOAD_IN_KEY());
  return d ? JSON.parse(d) : null;
}

function renderLoadInForm() {
  const loadIn = getLoadIn();
  const isSet  = loadIn !== null;

  document.getElementById('btn-edit-load').classList.toggle('hidden', !isSet);
  document.getElementById('btn-save-load').classList.toggle('hidden', isSet);

  // Priority first, then remaining products / 优先列表在前，其余产品在后
  const ordered = [
    ...VAN_ORDER.map(s => PRODUCTS.find(p => p.shorts === s)).filter(Boolean),
    ...PRODUCTS.filter(p => !VAN_ORDER.includes(p.shorts)),
  ];

  const inputCls = (disCls) =>
    `load-in-input w-14 text-center text-sm font-bold border border-gray-200 rounded-lg px-1 py-1.5 ${disCls}`;

  const form = document.getElementById('load-in-form');
  form.innerHTML = ordered.map(p => {
    const stored = loadIn ? (loadIn[p.shorts] || null) : null;
    const boxVal = stored ? (typeof stored === 'object' ? (stored.box || '') : '') : '';
    const eaVal  = stored ? (typeof stored === 'object' ? (stored.ea  || '') : stored) : '';
    const disCls = isSet ? 'bg-gray-50 text-gray-400' : 'bg-white';
    const dis    = isSet ? 'disabled' : '';

    let inputs;
    if (EA_ONLY.has(p.shorts)) {
      // Single ea input only / 只有个数输入
      inputs = `<input type="number" min="0" inputmode="numeric"
        class="${inputCls(disCls)}" data-shorts="${p.shorts}" data-type="ea"
        value="${eaVal}" ${dis} placeholder="0">`;
    } else if (BOX_ONLY.has(p.shorts)) {
      // Single box input with ×N label / 只有箱数输入
      inputs = `<input type="number" min="0" inputmode="numeric"
        class="${inputCls(disCls)}" data-shorts="${p.shorts}" data-type="box"
        value="${boxVal}" ${dis} placeholder="0">
        <span class="text-xs text-gray-400">×${p.eaBox}</span>`;
    } else {
      // Both box + ea / 箱数 + 散个数
      inputs = `<input type="number" min="0" inputmode="numeric"
        class="${inputCls(disCls)}" data-shorts="${p.shorts}" data-type="box"
        value="${boxVal}" ${dis} placeholder="0">
        <span class="text-xs text-gray-400">×${p.eaBox}</span>
        <input type="number" min="0" inputmode="numeric"
        class="${inputCls(disCls)}" data-shorts="${p.shorts}" data-type="ea"
        value="${eaVal}" ${dis} placeholder="ea">`;
    }

    return `
      <div class="flex items-center py-2 border-b border-gray-50 last:border-0">
        <span class="text-xs font-mono font-bold text-blue-500 w-10 shrink-0">${p.shorts}</span>
        <span class="text-xs text-gray-600 flex-1 min-w-0 truncate pr-1">${p.name}</span>
        <div class="flex items-center gap-1 shrink-0">${inputs}</div>
      </div>`;
  }).join('');
}

function saveLoadIn() {
  const data = {};
  document.querySelectorAll('.load-in-input').forEach(inp => {
    const shorts = inp.dataset.shorts;
    const type   = inp.dataset.type; // 'box' or 'ea'
    const val    = parseInt(inp.value, 10) || 0;
    if (!data[shorts]) data[shorts] = { box: 0, ea: 0 };
    data[shorts][type] = val;
  });
  // Drop products with zero total / 总数为零的不存储
  Object.keys(data).forEach(shorts => {
    const product = PRODUCTS.find(p => p.shorts === shorts);
    if (!product || (data[shorts].box * product.eaBox + data[shorts].ea) === 0)
      delete data[shorts];
  });
  localStorage.setItem(LOAD_IN_KEY(), JSON.stringify(data));
  renderVanPage();
}

function editLoadIn() {
  document.getElementById('btn-edit-load').classList.add('hidden');
  document.getElementById('btn-save-load').classList.remove('hidden');
  document.querySelectorAll('.load-in-input').forEach(inp => {
    inp.disabled = false;
    inp.classList.remove('bg-gray-50', 'text-gray-400');
    inp.classList.add('bg-white');
  });
}

// Total loaded qty for a product (handles both new {box,ea} and old number format)
// 计算某产品的总出货量（兼容新旧存储格式）
function getLoadedTotal(loadIn, product) {
  const val = loadIn[product.shorts];
  if (!val) return 0;
  if (typeof val === 'number') return val; // backward compat / 向后兼容
  return (val.box || 0) * product.eaBox + (val.ea || 0);
}

// --- Today's invoices from IndexedDB / 从IndexedDB获取今日发票 ---

function getTodayInvoices(cb) {
  if (!db) return cb([]);
  const prefix = getTodayPrefix();
  const req    = db.transaction('invoices', 'readonly').objectStore('invoices').getAll();
  req.onsuccess = e => cb(e.target.result.filter(inv => inv.invNum.startsWith(prefix)));
  req.onerror   = () => cb([]);
}

// --- Sold quantities: re-parse orderText of each invoice ---
// --- 已售数量：重新解析每张发票的orderText ---
function calcSoldQty(invoices) {
  const sold = {};
  invoices.forEach(inv => {
    if (!inv.orderText) return;
    inv.orderText.split('\n').slice(1).forEach(line => {
      if (!line.trim()) return;
      const r = parseCommand(line);
      if (r.error || r.isExchange) return; // exchange items don't count as sold / 换货不计入已售
      sold[r.product.shorts] = (sold[r.product.shorts] || 0) + r.qty;
    });
  });
  return sold;
}

// --- Sales summary by payment type / 按支付方式的销售汇总 ---

function renderSalesSummary(invoices) {
  const totals = { cash: 0, transfer: 0, cheque: 0 };
  const counts = { cash: 0, transfer: 0, cheque: 0 };
  invoices.forEach(inv => {
    const pt = getInvPayType(inv);
    totals[pt] = (totals[pt] || 0) + getInvTotal(inv);
    counts[pt] = (counts[pt] || 0) + 1;
  });
  const grandTotal = totals.cash + totals.transfer + totals.cheque;
  const el = document.getElementById('sales-summary');

  if (!invoices.length) {
    el.innerHTML = '<p class="text-sm text-gray-300 text-center py-4">No sales today</p>';
    return;
  }

  const rows = [
    { label: 'T · Cash',     pt: 'cash',     color: '#15803d' },
    { label: 'E · Transfer', pt: 'transfer', color: '#1e40af' },
    { label: 'Q · Cheque',   pt: 'cheque',   color: '#92400e' },
  ].filter(r => counts[r.pt] > 0);

  el.innerHTML = rows.map(r => `
    <div class="flex items-center justify-between py-2 border-b border-gray-50">
      <span class="text-sm font-medium text-gray-600">${r.label}</span>
      <div class="text-right">
        <span class="text-sm font-bold" style="color:${r.color};">$${totals[r.pt].toFixed(2)}</span>
        <span class="text-xs text-gray-400 ml-1">(${counts[r.pt]})</span>
      </div>
    </div>
  `).join('') + `
    <div class="flex items-center justify-between pt-2">
      <span class="text-base font-bold text-gray-800">Total</span>
      <span class="text-lg font-bold text-gray-800">$${grandTotal.toFixed(2)}</span>
    </div>`;
}

// --- Inventory table / 库存余量表 ---

function renderInventoryTable(invoices) {
  const loadIn = getLoadIn();
  const el     = document.getElementById('inventory-table');

  if (!loadIn) {
    el.innerHTML = '<p class="text-xs text-gray-300 text-center py-3">Set morning load-in first / 请先录入出货量</p>';
    return;
  }

  const sold    = calcSoldQty(invoices);
  const allOrdered = [
    ...VAN_ORDER.map(s => PRODUCTS.find(p => p.shorts === s)).filter(Boolean),
    ...PRODUCTS.filter(p => !VAN_ORDER.includes(p.shorts)),
  ];
  const loaded = allOrdered.filter(p => getLoadedTotal(loadIn, p) > 0);

  if (!loaded.length) {
    el.innerHTML = '<p class="text-xs text-gray-300 text-center py-3">No products loaded today</p>';
    return;
  }

  el.innerHTML = `
    <div class="flex items-center py-1.5 border-b border-gray-200 text-xs text-gray-400 font-medium bg-white">
      <span class="flex-1">Product</span>
      <span class="w-10 text-center">Out</span>
      <span class="w-10 text-center">Sold</span>
      <span class="w-10 text-right">Left</span>
    </div>` +
  loaded.map((p, idx) => {
    const loadedQty = getLoadedTotal(loadIn, p);
    const soldQty   = sold[p.shorts] || 0;
    const left      = loadedQty - soldQty;
    const leftCls   = left < 0 ? 'text-red-500' : left === 0 ? 'text-gray-400' : 'text-green-600';
    const zebra     = idx % 2 === 1 ? 'style="background:#f8f9fa"' : '';
    return `
      <div class="flex items-center py-2 border-b border-gray-50 last:border-0" ${zebra}>
        <span class="flex-1 text-xs font-mono font-bold text-blue-600 pr-1">${p.shorts}</span>
        <span class="w-10 text-center text-sm text-gray-500">${loadedQty}</span>
        <span class="w-10 text-center text-sm text-gray-500">${soldQty}</span>
        <span class="w-10 text-right text-sm font-bold ${leftCls}">${left}</span>
      </div>`;
  }).join('');
}

// --- Day Summary text / 日结文本摘要 ---

function generateSummary() {
  getTodayInvoices(invoices => {

function renderSummaryModal(invoices, loadIn, sold) {
  const d       = new Date();
  const dateStr = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  document.getElementById('summary-date-title').textContent = dateStr;
  document.getElementById('summary-total-count').textContent = `(共 ${invoices.length} 笔)`;

  const PTLabel = { cash: 'T', transfer: 'E', cheque: 'Q' };
  const PTColor = { cash: 'text-green-600', transfer: 'text-blue-600', cheque: 'text-orange-500' };
  const PTBg    = { cash: '#f0fdf4', transfer: '#eff6ff', cheque: '#fff7ed' };
  const PTText  = { cash: '#15803d', transfer: '#1d4ed8', cheque: '#c2410c' };
  const PTTitle = { cash: 'Total T (Cash)', transfer: 'Total E (Transfer)', cheque: 'Total Q (Cheque)' };

  const groups = { cash: [], transfer: [], cheque: [] };
  invoices.forEach(inv => { const pt = getInvPayType(inv); if (groups[pt]) groups[pt].push(inv); });

  const tbody = document.getElementById('summary-rows');
  tbody.innerHTML = '';
  const textLines = [
    `=== Day Summary · ${dateStr} (共 ${invoices.length} 笔) ===`,
    `${'#'.padEnd(3)}${'Store'.padEnd(22)} ${'Amount'.padStart(9)}  T/E/Q`,
    '-'.repeat(42),
  ];

  let rowIdx = 0;
  let grandTotal = 0;

  ['cash', 'transfer', 'cheque'].forEach(pt => {
    const group = groups[pt];
    if (!group.length) return;

    let groupTotal = 0;
    group.forEach(inv => {
      rowIdx++;
      const amt   = getInvTotal(inv);
      groupTotal += amt;
      const store = inv.storeName || '—';
      const label = PTLabel[pt];
      const bg    = rowIdx % 2 === 0 ? '#f8f9fa' : '#ffffff';
      const tr = document.createElement('tr');
      tr.style.background = bg;
      tr.innerHTML = `
        <td class="py-1.5 pl-1 text-xs text-gray-400 w-7">${rowIdx}</td>
        <td class="py-1.5 text-gray-800 font-medium">${store}</td>
        <td class="py-1.5 text-right font-mono font-bold">$${amt.toFixed(2)}</td>
        <td class="py-1.5 text-right font-bold w-8 ${PTColor[pt]}">${label}</td>`;
      tbody.appendChild(tr);
      textLines.push(`${String(rowIdx).padEnd(3)}${store.padEnd(22)} $${amt.toFixed(2).padStart(8)}  ${label}`);
    });

    grandTotal += groupTotal;
    const sub = document.createElement('tr');
    sub.style.background = PTBg[pt];
    sub.innerHTML = `
      <td class="py-1 pl-1 text-xs" colspan="2">
        <span style="color:${PTText[pt]};font-weight:600;font-size:11px;">${PTTitle[pt]}</span>
      </td>
      <td class="py-1 text-right font-mono font-semibold text-xs" style="color:${PTText[pt]};">$${groupTotal.toFixed(2)}</td>
      <td></td>`;
    tbody.appendChild(sub);
    textLines.push(`   ${PTTitle[pt].padEnd(22)} $${groupTotal.toFixed(2).padStart(8)}`);
  });

  const tfoot = document.getElementById('summary-foot');
  tfoot.innerHTML = '';
  const gtr = document.createElement('tr');
  gtr.style.cssText = 'border-top:2px solid #d1d5db;background:#f3f4f6;';
  gtr.innerHTML = `
    <td class="py-2 pl-1 font-bold text-gray-900 text-base" colspan="2">Grand Total</td>
    <td class="py-2 text-right font-mono font-bold text-gray-900 text-base">$${grandTotal.toFixed(2)}</td>
    <td></td>`;
  tfoot.appendChild(gtr);
  textLines.push('='.repeat(42));
  textLines.push(`${'Grand Total'.padEnd(25)} $${grandTotal.toFixed(2).padStart(9)}`);

  if (loadIn && sold) {
    textLines.push('', 'INVENTORY');
    const ordered = [
      ...VAN_ORDER.map(s => PRODUCTS.find(p => p.shorts === s)).filter(Boolean),
      ...PRODUCTS.filter(p => !VAN_ORDER.includes(p.shorts)),
    ].filter(p => getLoadedTotal(loadIn, p) > 0);
    ordered.forEach(p => {
      const loadedQty = getLoadedTotal(loadIn, p);
      const soldQty   = sold[p.shorts] || 0;
      const left      = loadedQty - soldQty;
      textLines.push(`${p.shorts.padEnd(8)} Out:${String(loadedQty).padStart(3)}  Sold:${String(soldQty).padStart(3)}  Left:${String(left).padStart(3)}`);
    });
  }

  textLines.push('', '— My Sales Calc');

  // ── Audit / 对账框 ──────────────────────────────────────────
  const auditEl  = document.getElementById('summary-audit');
  const totalExp = expenses.lunch + expenses.petrol + expenses.others + expenses.others2;
  const cashOnly = groups.cash.reduce((s, inv) => s + getInvTotal(inv), 0);
  const netCash  = cashOnly - totalExp;
  const rounded   = Math.round(netCash * 2) / 2; // nearest $0.50

  const row = (label, val, cls) =>
    `<div style="display:flex;justify-content:space-between;padding:2px 0;">
       <span style="color:#6b7280;">${label}</span>
       <span class="${cls}" style="font-weight:700;">${val}</span>
     </div>`;

  let auditHtml = `
    <div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">
      Audit / 对账
    </div>`;
  auditHtml += row('Cash Sales (T)', `$${cashOnly.toFixed(2)}`, 'text-green-600');
  if (expenses.lunch   > 0) auditHtml += row('  · Lunch',                                   `-$${expenses.lunch.toFixed(2)}`,   'text-red-500');
  if (expenses.petrol  > 0) auditHtml += row('  · Petrol',                                  `-$${expenses.petrol.toFixed(2)}`,  'text-red-500');
  if (expenses.others  > 0) auditHtml += row(`  · ${expenses.label1 || 'Others'}`,          `-$${expenses.others.toFixed(2)}`,  'text-red-500');
  if (expenses.others2 > 0) auditHtml += row(`  · ${expenses.label2 || 'Others'}`,          `-$${expenses.others2.toFixed(2)}`, 'text-red-500');
  if (totalExp > 0) {
    auditHtml += `<div style="border-top:1px solid #e5e7eb;margin:4px 0;"></div>`;
    auditHtml += row('Total Expenses', `-$${totalExp.toFixed(2)}`, 'text-red-600');
  }
  auditHtml += `<div style="border-top:2px solid #d1d5db;margin:6px 0;"></div>`;
  auditHtml += row('Net Cash', `$${netCash.toFixed(2)}`, 'text-gray-900');
  auditHtml += row('Rounded (÷ $0.50)', `$${rounded.toFixed(2)}`, 'text-blue-700');

  auditEl.innerHTML = auditHtml;
  auditEl.classList.remove('hidden');

  // append audit to clipboard text
  textLines.push('', '─── Audit ───────────────────────────');
  textLines.push(`${'Cash Sales (T)'.padEnd(22)} $${cashOnly.toFixed(2).padStart(8)}`);
  if (expenses.lunch   > 0) textLines.push(`${'  Lunch'.padEnd(22)} -$${expenses.lunch.toFixed(2).padStart(7)}`);
  if (expenses.petrol  > 0) textLines.push(`${'  Petrol'.padEnd(22)} -$${expenses.petrol.toFixed(2).padStart(7)}`);
  if (expenses.others  > 0) textLines.push(`${'  '.concat(expenses.label1 || 'Others').padEnd(22)} -$${expenses.others.toFixed(2).padStart(7)}`);
  if (expenses.others2 > 0) textLines.push(`${'  '.concat(expenses.label2 || 'Others').padEnd(22)} -$${expenses.others2.toFixed(2).padStart(7)}`);
  if (totalExp > 0)         textLines.push(`${'Total Expenses'.padEnd(22)} -$${totalExp.toFixed(2).padStart(7)}`);
  textLines.push(`${'Net Cash'.padEnd(22)} $${netCash.toFixed(2).padStart(8)}`);
  textLines.push(`${'Rounded (÷ $0.50)'.padEnd(22)} $${rounded.toFixed(2).padStart(8)}`);

  document.getElementById('summary-text').value = textLines.join('\n');
  document.getElementById('summary-modal').classList.remove('hidden');
  lucide.createIcons();
}

function closeSummaryModal() {
  document.getElementById('summary-modal').classList.add('hidden');
}

function copySummary() {
  const el = document.getElementById('summary-text');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(el.value).then(() => alert('Copied!'));
  } else {
    el.select();
    document.execCommand('copy');
    alert('Copied!');
  }
}

// --- Clear Day: remove today's load-in only, preserve invoice history ---
// --- 清空当天：只删除出货录入，保留发票历史 ---
function clearDay() {
  if (!confirm('Clear today\'s load-in? Invoice history is kept.\n清空今日出货录入？发票历史保留。')) return;
  localStorage.removeItem(LOAD_IN_KEY());
  renderVanPage();
}


// ============================================================
// 15. EXPENSES / 报销管理
// ============================================================
function fmtExp(el) {
  if (el.value) el.value = parseFloat(el.value).toFixed(2);
}

function loadExpenses() {
  try {
    const saved = localStorage.getItem('expenses_v1');
    if (saved) expenses = { lunch: 0, petrol: 0, others: 0, others2: 0, label1: '', label2: '', ...JSON.parse(saved) };
  } catch(e) {}
}

function saveExpenses() {
  expenses = {
    lunch:   Math.max(0, parseFloat(document.getElementById('exp-lunch').value)   || 0),
    petrol:  Math.max(0, parseFloat(document.getElementById('exp-petrol').value)  || 0),
    others:  Math.max(0, parseFloat(document.getElementById('exp-others').value)  || 0),
    others2: Math.max(0, parseFloat(document.getElementById('exp-others2').value) || 0),
    label1:  document.getElementById('exp-label1').value.trim(),
    label2:  document.getElementById('exp-label2').value.trim(),
  };
  localStorage.setItem('expenses_v1', JSON.stringify(expenses));
  const total = expenses.lunch + expenses.petrol + expenses.others + expenses.others2;
  document.getElementById('exp-total').textContent = `$${total.toFixed(2)}`;
}

function renderExpensesPage() {
  document.getElementById('exp-lunch').value   = expenses.lunch   ? expenses.lunch.toFixed(2)   : '';
  document.getElementById('exp-petrol').value  = expenses.petrol  ? expenses.petrol.toFixed(2)  : '';
  document.getElementById('exp-others').value  = expenses.others  ? expenses.others.toFixed(2)  : '';
  document.getElementById('exp-others2').value = expenses.others2 ? expenses.others2.toFixed(2) : '';
  document.getElementById('exp-label1').value  = expenses.label1  || '';
  document.getElementById('exp-label2').value  = expenses.label2  || '';
  const total = expenses.lunch + expenses.petrol + expenses.others + expenses.others2;
  document.getElementById('exp-total').textContent = `$${total.toFixed(2)}`;
}


// ============================================================
// 16. INIT / 初始化
// ============================================================
initDB(() => {
  loadPersistedState();
  loadExpenses();
  lucide.createIcons();
});
</script>
